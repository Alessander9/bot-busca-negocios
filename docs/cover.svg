<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1600 500" role="img" aria-labelledby="title desc">
  <title id="title">Prospector Web Local</title>
  <desc id="desc">Portada del repositorio con estilo geoespacial y acentos verdes y cian.</desc>
  <defs>
